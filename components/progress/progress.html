<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress — Design System</title>
  <link rel="stylesheet" href="../../build/css/core.css" />
  <link rel="stylesheet" href="../../build/css/semantic.css" />
  <link rel="stylesheet" href="../../build/css/base.css" />
  <link rel="stylesheet" href="progress.css" />
  <style>
    body {
      background: var(--ds-surface-page);
      color: var(--ds-content-text-primary);
      font-family: sans-serif;
      padding: 2rem;
    }
    h2 {
      margin: 2rem 0 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--ds-content-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    h2:first-child { margin-top: 0; }
    .demo-stack {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      max-width: 480px;
    }
    .demo-row {
      display: flex;
      gap: 2rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <h2>Linear — Sizes at Various Values</h2>
  <div class="demo-stack">

    <div class="ds-progress ds-progress--sm" role="progressbar" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100" aria-label="Upload progress">
      <div class="ds-progress__header">
        <span class="ds-progress__label">Small — 25%</span>
        <span class="ds-progress__value">25%</span>
      </div>
      <div class="ds-progress__track">
        <div class="ds-progress__fill" style="width: 25%;"></div>
      </div>
    </div>

    <div class="ds-progress ds-progress--md" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100" aria-label="Download progress">
      <div class="ds-progress__header">
        <span class="ds-progress__label">Medium — 60%</span>
        <span class="ds-progress__value">60%</span>
      </div>
      <div class="ds-progress__track">
        <div class="ds-progress__fill" style="width: 60%;"></div>
      </div>
    </div>

    <div class="ds-progress ds-progress--lg" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" aria-label="Install progress">
      <div class="ds-progress__header">
        <span class="ds-progress__label">Large — 100%</span>
        <span class="ds-progress__value">100%</span>
      </div>
      <div class="ds-progress__track">
        <div class="ds-progress__fill" style="width: 100%;"></div>
      </div>
    </div>

  </div>

  <h2>Fill State Variants</h2>
  <div class="demo-stack">

    <div class="ds-progress ds-progress--md" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" aria-label="Success progress">
      <div class="ds-progress__header">
        <span class="ds-progress__label">Success</span>
        <span class="ds-progress__value">75%</span>
      </div>
      <div class="ds-progress__track">
        <div class="ds-progress__fill ds-progress__fill--success" style="width: 75%;"></div>
      </div>
    </div>

    <div class="ds-progress ds-progress--md" role="progressbar" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100" aria-label="Error progress">
      <div class="ds-progress__header">
        <span class="ds-progress__label">Error</span>
        <span class="ds-progress__value">40%</span>
      </div>
      <div class="ds-progress__track">
        <div class="ds-progress__fill ds-progress__fill--error" style="width: 40%;"></div>
      </div>
    </div>

  </div>

  <h2>Indeterminate</h2>
  <div class="demo-stack">

    <div class="ds-progress ds-progress--md ds-progress--indeterminate" role="progressbar" aria-label="Loading" aria-busy="true">
      <div class="ds-progress__header">
        <span class="ds-progress__label">Loading…</span>
      </div>
      <div class="ds-progress__track">
        <div class="ds-progress__fill"></div>
      </div>
    </div>

    <div class="ds-progress ds-progress--sm ds-progress--indeterminate" role="progressbar" aria-label="Processing" aria-busy="true">
      <div class="ds-progress__track">
        <div class="ds-progress__fill ds-progress__fill--success"></div>
      </div>
    </div>

  </div>

  <h2>Circular</h2>
  <div class="demo-row">

    <!-- 33% -->
    <div class="ds-progress ds-progress--circular" aria-label="33% complete">
      <div class="ds-progress__circle-wrapper">
        <svg class="ds-progress__circle-svg" width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
          <circle class="ds-progress__circle-track" cx="32" cy="32" r="26" stroke-width="6"/>
          <!-- Circumference = 2 * PI * 26 ≈ 163.4; 33% offset = 163.4 * (1 - 0.33) ≈ 109.5 -->
          <circle class="ds-progress__circle-fill" cx="32" cy="32" r="26" stroke-width="6"
            stroke-dasharray="163.4"
            stroke-dashoffset="109.5"/>
        </svg>
        <span class="ds-progress__circle-text">33%</span>
      </div>
      <span style="font-size: var(--ds-action-primary-font-size-sm); color: var(--ds-content-text-secondary);">Uploading</span>
    </div>

    <!-- 67% -->
    <div class="ds-progress ds-progress--circular" aria-label="67% complete">
      <div class="ds-progress__circle-wrapper">
        <svg class="ds-progress__circle-svg" width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
          <circle class="ds-progress__circle-track" cx="32" cy="32" r="26" stroke-width="6"/>
          <!-- 67% offset = 163.4 * (1 - 0.67) ≈ 53.9 -->
          <circle class="ds-progress__circle-fill" cx="32" cy="32" r="26" stroke-width="6"
            stroke-dasharray="163.4"
            stroke-dashoffset="53.9"/>
        </svg>
        <span class="ds-progress__circle-text">67%</span>
      </div>
      <span style="font-size: var(--ds-action-primary-font-size-sm); color: var(--ds-content-text-secondary);">Processing</span>
    </div>

    <!-- 100% success -->
    <div class="ds-progress ds-progress--circular" aria-label="Complete">
      <div class="ds-progress__circle-wrapper">
        <svg class="ds-progress__circle-svg" width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
          <circle class="ds-progress__circle-track" cx="32" cy="32" r="26" stroke-width="6"/>
          <circle class="ds-progress__circle-fill" cx="32" cy="32" r="26" stroke-width="6"
            stroke-dasharray="163.4"
            stroke-dashoffset="0"
            style="stroke: var(--ds-status-success, var(--ds-action-primary-bg));"/>
        </svg>
        <span class="ds-progress__circle-text">✓</span>
      </div>
      <span style="font-size: var(--ds-action-primary-font-size-sm); color: var(--ds-content-text-secondary);">Complete</span>
    </div>

  </div>

</body>
</html>
