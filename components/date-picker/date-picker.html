<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Picker — Base BNTS DS</title>
  <link rel="stylesheet" href="../../build/css/core.css">
  <link rel="stylesheet" href="../../build/css/semantic.css">
  <link rel="stylesheet" href="../../build/css/base.css">
  <link rel="stylesheet" href="date-picker.css">
  <style>
    body { font-family: sans-serif; background: var(--ds-surface-page); padding: 2rem; color: var(--ds-content-text-primary); }
    h2 { font-size: 1rem; font-weight: 600; margin: 2rem 0 0.5rem; color: var(--ds-content-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:0.25rem">Date Picker — base design system</h1>
  <p style="color:var(--ds-content-text-secondary);font-size:0.875rem;margin-top:0">All values resolved from CSS variables.</p>

  <h2>Input with trigger</h2>
  <div class="ds-date-picker">
    <label class="ds-date-picker__label" for="dp-input">Select date</label>
    <div class="ds-date-picker__input-row">
      <input id="dp-input" type="date" class="ds-date-picker__input" value="2026-06-30">
      <button class="ds-date-picker__trigger" aria-label="Open calendar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 1v3M11 1v3M2 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <h2>Calendar (static demo)</h2>
  <div class="ds-date-picker__calendar" role="dialog" aria-label="Calendar">
    <div class="ds-date-picker__calendar-header">
      <button class="ds-date-picker__nav" aria-label="Previous month">&#8249;</button>
      <span class="ds-date-picker__month-label">June 2026</span>
      <button class="ds-date-picker__nav" aria-label="Next month">&#8250;</button>
    </div>
    <div class="ds-date-picker__grid" role="grid">
      <div class="ds-date-picker__day-name">Su</div>
      <div class="ds-date-picker__day-name">Mo</div>
      <div class="ds-date-picker__day-name">Tu</div>
      <div class="ds-date-picker__day-name">We</div>
      <div class="ds-date-picker__day-name">Th</div>
      <div class="ds-date-picker__day-name">Fr</div>
      <div class="ds-date-picker__day-name">Sa</div>

      <button class="ds-date-picker__day ds-date-picker__day--outside">25</button>
      <button class="ds-date-picker__day ds-date-picker__day--outside">26</button>
      <button class="ds-date-picker__day ds-date-picker__day--outside">27</button>
      <button class="ds-date-picker__day ds-date-picker__day--outside">28</button>
      <button class="ds-date-picker__day ds-date-picker__day--outside">29</button>
      <button class="ds-date-picker__day ds-date-picker__day--outside">30</button>
      <button class="ds-date-picker__day ds-date-picker__day--outside">31</button>

      <button class="ds-date-picker__day">1</button>
      <button class="ds-date-picker__day">2</button>
      <button class="ds-date-picker__day">3</button>
      <button class="ds-date-picker__day">4</button>
      <button class="ds-date-picker__day">5</button>
      <button class="ds-date-picker__day">6</button>
      <button class="ds-date-picker__day">7</button>
      <button class="ds-date-picker__day">8</button>
      <button class="ds-date-picker__day">9</button>
      <button class="ds-date-picker__day">10</button>
      <button class="ds-date-picker__day">11</button>
      <button class="ds-date-picker__day">12</button>
      <button class="ds-date-picker__day">13</button>
      <button class="ds-date-picker__day">14</button>
      <button class="ds-date-picker__day">15</button>
      <button class="ds-date-picker__day">16</button>
      <button class="ds-date-picker__day">17</button>
      <button class="ds-date-picker__day">18</button>
      <button class="ds-date-picker__day">19</button>
      <button class="ds-date-picker__day">20</button>
      <button class="ds-date-picker__day">21</button>
      <button class="ds-date-picker__day">22</button>
      <button class="ds-date-picker__day">23</button>
      <button class="ds-date-picker__day">24</button>
      <button class="ds-date-picker__day">25</button>
      <button class="ds-date-picker__day">26</button>
      <button class="ds-date-picker__day">27</button>
      <button class="ds-date-picker__day">28</button>
      <button class="ds-date-picker__day">29</button>
      <button class="ds-date-picker__day ds-date-picker__day--selected ds-date-picker__day--today">30</button>
    </div>
  </div>

  <h2>Disabled</h2>
  <div class="ds-date-picker">
    <label class="ds-date-picker__label" for="dp-disabled">Locked date</label>
    <div class="ds-date-picker__input-row">
      <input id="dp-disabled" type="date" class="ds-date-picker__input" value="2026-01-01" disabled>
    </div>
  </div>
</body>
</html>
