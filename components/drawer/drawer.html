<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drawer Component — Design System</title>
  <link rel="stylesheet" href="../../build/css/core.css" />
  <link rel="stylesheet" href="../../build/css/semantic.css" />
  <link rel="stylesheet" href="../../build/css/base.css" />
  <link rel="stylesheet" href="drawer.css" />
  <style>
    body {
      background: var(--ds-surface-page);
      color: var(--ds-content-text-primary);
      font-family: sans-serif;
      padding: 2rem;
    }
    .demo-section {
      margin-bottom: 4rem;
    }
    .demo-label {
      font-size: var(--ds-action-primary-font-size-sm);
      color: var(--ds-content-text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }
    /* Static demo frame — simulate the fixed positioning in a bounded box */
    .demo-frame {
      position: relative;
      overflow: hidden;
      background: var(--ds-overlay-scrim, rgba(0, 0, 0, 0.5));
      border-radius: var(--ds-action-primary-radius);
      height: 400px;
      display: flex;
    }
    .demo-frame--bottom {
      align-items: flex-end;
    }
    /* Override fixed positioning for demo */
    .demo-frame .ds-drawer-backdrop {
      position: absolute;
    }
    .demo-frame .ds-drawer {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      max-width: 320px;
    }
    .demo-frame .ds-drawer--left {
      right: auto;
      left: 0;
    }
    .demo-frame .ds-drawer--bottom {
      position: absolute;
      top: auto;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      max-width: 100%;
      height: auto;
      max-height: 60%;
    }
    /* Close icon */
    .icon-close::before {
      content: "✕";
      font-size: 1rem;
      line-height: 1;
    }
    .form-field {
      margin-bottom: 1rem;
    }
    .form-field label {
      display: block;
      font-size: var(--ds-action-primary-font-size-sm);
      color: var(--ds-content-text-secondary);
      margin-bottom: 0.375rem;
      font-weight: 500;
    }
    .form-field input,
    .form-field textarea,
    .form-field select {
      width: 100%;
      box-sizing: border-box;
      padding: var(--ds-action-primary-padding-y-md) var(--ds-action-primary-padding-x-md);
      border: var(--ds-border-default-width) solid var(--ds-border-default-color);
      border-radius: var(--ds-action-primary-radius);
      background: var(--ds-surface-page);
      color: var(--ds-content-text-primary);
      font-size: var(--ds-action-primary-font-size-md);
      font-family: inherit;
    }
    .form-field textarea {
      resize: vertical;
      min-height: 80px;
    }
  </style>
</head>
<body>

  <!-- Right Drawer (default) -->
  <div class="demo-section">
    <p class="demo-label">Right Drawer — default (400px)</p>
    <div class="demo-frame">
      <div class="ds-drawer-backdrop" aria-hidden="true"></div>
      <div
        class="ds-drawer"
        role="dialog"
        aria-modal="true"
        aria-labelledby="drawer-title-1"
        tabindex="-1"
      >
        <div class="ds-drawer__header">
          <h2 class="ds-drawer__title" id="drawer-title-1">Edit Profile</h2>
          <button class="ds-drawer__close" type="button" aria-label="Close drawer">
            <span class="icon-close" aria-hidden="true"></span>
          </button>
        </div>
        <div class="ds-drawer__body">
          <div class="form-field">
            <label for="drawer-name">Display Name</label>
            <input id="drawer-name" type="text" value="Jane Smith" />
          </div>
          <div class="form-field">
            <label for="drawer-email">Email Address</label>
            <input id="drawer-email" type="email" value="jane@example.com" />
          </div>
          <div class="form-field">
            <label for="drawer-bio">Bio</label>
            <textarea id="drawer-bio">Product designer based in Austin, TX.</textarea>
          </div>
          <div class="form-field">
            <label for="drawer-role">Role</label>
            <select id="drawer-role">
              <option>Designer</option>
              <option>Engineer</option>
              <option>Product Manager</option>
            </select>
          </div>
        </div>
        <div class="ds-drawer__footer">
          <button class="ds-btn ds-btn--ghost" type="button">Cancel</button>
          <button class="ds-btn ds-btn--primary" type="button">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Left Drawer -->
  <div class="demo-section">
    <p class="demo-label">Left Drawer — <code>ds-drawer--left</code></p>
    <div class="demo-frame">
      <div class="ds-drawer-backdrop" aria-hidden="true"></div>
      <div
        class="ds-drawer ds-drawer--left"
        role="dialog"
        aria-modal="true"
        aria-labelledby="drawer-title-2"
        tabindex="-1"
      >
        <div class="ds-drawer__header">
          <h2 class="ds-drawer__title" id="drawer-title-2">Navigation</h2>
          <button class="ds-drawer__close" type="button" aria-label="Close navigation drawer">
            <span class="icon-close" aria-hidden="true"></span>
          </button>
        </div>
        <div class="ds-drawer__body">
          <nav aria-label="Main navigation">
            <ul style="list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.25rem;">
              <li>
                <a href="#" style="display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem 0.75rem; border-radius: var(--ds-action-primary-radius); color: var(--ds-content-text-primary); text-decoration: none; font-weight: 500; background: var(--ds-action-secondary-bg);">
                  Dashboard
                </a>
              </li>
              <li>
                <a href="#" style="display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem 0.75rem; border-radius: var(--ds-action-primary-radius); color: var(--ds-content-text-secondary); text-decoration: none;">
                  Projects
                </a>
              </li>
              <li>
                <a href="#" style="display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem 0.75rem; border-radius: var(--ds-action-primary-radius); color: var(--ds-content-text-secondary); text-decoration: none;">
                  Team
                </a>
              </li>
              <li>
                <a href="#" style="display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem 0.75rem; border-radius: var(--ds-action-primary-radius); color: var(--ds-content-text-secondary); text-decoration: none;">
                  Settings
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Sheet Drawer -->
  <div class="demo-section">
    <p class="demo-label">Bottom Sheet — <code>ds-drawer--bottom</code></p>
    <div class="demo-frame demo-frame--bottom">
      <div class="ds-drawer-backdrop" aria-hidden="true"></div>
      <div
        class="ds-drawer ds-drawer--bottom"
        role="dialog"
        aria-modal="true"
        aria-labelledby="drawer-title-3"
        tabindex="-1"
      >
        <div class="ds-drawer__header">
          <h2 class="ds-drawer__title" id="drawer-title-3">Share with team</h2>
          <button class="ds-drawer__close" type="button" aria-label="Close bottom sheet">
            <span class="icon-close" aria-hidden="true"></span>
          </button>
        </div>
        <div class="ds-drawer__body">
          <p style="margin: 0 0 1rem;">Choose who can view and edit this document.</p>
          <div class="form-field">
            <label for="drawer-share-email">Invite by email</label>
            <input id="drawer-share-email" type="email" placeholder="colleague@example.com" />
          </div>
        </div>
        <div class="ds-drawer__footer">
          <button class="ds-btn ds-btn--ghost" type="button">Cancel</button>
          <button class="ds-btn ds-btn--primary" type="button">Send Invite</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
