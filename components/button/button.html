<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button — Base BNTS DS</title>
  <!-- Token cascade: core → semantic → base -->
  <link rel="stylesheet" href="../../build/css/core.css">
  <link rel="stylesheet" href="../../build/css/semantic.css">
  <link rel="stylesheet" href="../../build/css/base.css">
  <!-- Headless component styles — no hardcoded values -->
  <link rel="stylesheet" href="button.css">
  <style>
    body { font-family: sans-serif; background: var(--ds-surface-page); padding: 2rem; color: var(--ds-content-text-primary); }
    h2 { font-size: 1rem; font-weight: 600; margin: 2rem 0 0.5rem; color: var(--ds-content-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
    .row { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }
  </style>
</head>
<body>
  <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:0.25rem">Button — base design system</h1>
  <p style="color:var(--ds-content-text-secondary);font-size:0.875rem;margin-top:0">All colours, radii, and spacing are resolved from CSS variables — no hardcoded values.</p>

  <h2>Primary</h2>
  <div class="row">
    <button class="ds-button ds-button--primary ds-button--sm">Small</button>
    <button class="ds-button ds-button--primary ds-button--md">Medium</button>
    <button class="ds-button ds-button--primary ds-button--lg">Large</button>
    <button class="ds-button ds-button--primary ds-button--md" disabled>Disabled</button>
  </div>

  <h2>Secondary</h2>
  <div class="row">
    <button class="ds-button ds-button--secondary ds-button--sm">Small</button>
    <button class="ds-button ds-button--secondary ds-button--md">Medium</button>
    <button class="ds-button ds-button--secondary ds-button--lg">Large</button>
    <button class="ds-button ds-button--secondary ds-button--md" disabled>Disabled</button>
  </div>

  <h2>Ghost</h2>
  <div class="row">
    <button class="ds-button ds-button--ghost ds-button--sm">Small</button>
    <button class="ds-button ds-button--ghost ds-button--md">Medium</button>
    <button class="ds-button ds-button--ghost ds-button--lg">Large</button>
    <button class="ds-button ds-button--ghost ds-button--md" disabled>Disabled</button>
  </div>

  <h2>Destructive</h2>
  <div class="row">
    <button class="ds-button ds-button--destructive ds-button--sm">Delete</button>
    <button class="ds-button ds-button--destructive ds-button--md">Delete</button>
    <button class="ds-button ds-button--destructive ds-button--lg">Delete</button>
    <button class="ds-button ds-button--destructive ds-button--md" disabled>Disabled</button>
  </div>

  <h2>With icon (leading)</h2>
  <div class="row">
    <button class="ds-button ds-button--primary ds-button--md">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Add item
    </button>
    <button class="ds-button ds-button--ghost ds-button--md">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 5v4l2.5 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Schedule
    </button>
  </div>

  <h2>Icon only</h2>
  <div class="row">
    <button class="ds-button ds-button--primary ds-button--icon-only ds-button--sm" aria-label="Add">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="ds-button ds-button--primary ds-button--icon-only ds-button--md" aria-label="Add">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="ds-button ds-button--ghost ds-button--icon-only ds-button--md" aria-label="Close">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</body>
</html>
