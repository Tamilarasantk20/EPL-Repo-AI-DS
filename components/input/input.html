<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input — Base BNTS DS</title>
  <link rel="stylesheet" href="../../build/css/core.css">
  <link rel="stylesheet" href="../../build/css/semantic.css">
  <link rel="stylesheet" href="../../build/css/base.css">
  <link rel="stylesheet" href="input.css">
  <style>
    body { font-family: sans-serif; background: var(--ds-surface-page); padding: 2rem; color: var(--ds-content-text-primary); max-width: 480px; }
    h2 { font-size: 1rem; font-weight: 600; margin: 2rem 0 0.5rem; color: var(--ds-content-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
    .stack { display: flex; flex-direction: column; gap: 1rem; }
  </style>
</head>
<body>
  <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:0.25rem">Input — base design system</h1>
  <p style="color:var(--ds-content-text-secondary);font-size:0.875rem;margin-top:0">All values resolved from CSS variables.</p>

  <h2>Sizes</h2>
  <div class="stack">
    <div class="ds-input-wrapper">
      <label class="ds-input-label" for="inp-sm">Small</label>
      <input id="inp-sm" class="ds-input ds-input--sm" type="text" placeholder="Small input">
    </div>
    <div class="ds-input-wrapper">
      <label class="ds-input-label" for="inp-md">Medium</label>
      <input id="inp-md" class="ds-input ds-input--md" type="text" placeholder="Medium input">
    </div>
    <div class="ds-input-wrapper">
      <label class="ds-input-label" for="inp-lg">Large</label>
      <input id="inp-lg" class="ds-input ds-input--lg" type="text" placeholder="Large input">
    </div>
  </div>

  <h2>States</h2>
  <div class="stack">
    <div class="ds-input-wrapper">
      <label class="ds-input-label" for="inp-error">Error</label>
      <input id="inp-error" class="ds-input ds-input--md ds-input--error" type="text" value="Invalid value" aria-describedby="inp-error-hint">
      <span id="inp-error-hint" class="ds-input-hint ds-input-hint--error">This field is required.</span>
    </div>
    <div class="ds-input-wrapper">
      <label class="ds-input-label" for="inp-hint">With hint</label>
      <input id="inp-hint" class="ds-input ds-input--md" type="text" placeholder="Enter value" aria-describedby="inp-hint-msg">
      <span id="inp-hint-msg" class="ds-input-hint">Helper text goes here.</span>
    </div>
    <div class="ds-input-wrapper">
      <label class="ds-input-label" for="inp-disabled">Disabled</label>
      <input id="inp-disabled" class="ds-input ds-input--md" type="text" value="Disabled" disabled>
    </div>
  </div>

  <h2>With icon</h2>
  <div class="ds-input-wrapper">
    <label class="ds-input-label" for="inp-icon">Search</label>
    <div class="ds-input-group">
      <span class="ds-input-group__icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <input id="inp-icon" class="ds-input ds-input--md" type="search" placeholder="Search…">
    </div>
  </div>
</body>
</html>
