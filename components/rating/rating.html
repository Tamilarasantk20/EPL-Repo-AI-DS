  <!-- Interactive 5-star radio group -->
  <div class="demo-section">
    <div class="demo-label">Interactive — radio input group (accessible)</div>
    <fieldset style="border: none; padding: 0; margin: 0;">
      <legend style="font-size: 0.875rem; color: var(--ds-content-text-secondary); margin-bottom: 0.5rem;">Rate this product</legend>
      <div class="ds-rating ds-rating--md" role="group">
        <input class="ds-rating__input" type="radio" name="rating-interactive" id="rating-1" value="1" />
        <label class="ds-rating__star" for="rating-1" aria-label="1 star">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
          </svg>
